<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTL Architecture Diagram</title>
    <link rel="stylesheet" href="src/css/styles.css" />
  </head>
  <body data-page="architecture">
    <header class="hero">
      <h1>Architecture: Setup / Runtime / Consumers</h1>
      <nav class="tabs" aria-label="Diagram pages">
        <a href="index.html" class="tab">Overview</a><a href="architecture.html" class="tab active">Architecture</a><a href="lifecycle.html" class="tab">Lifecycle</a><a href="troubleshooting.html" class="tab">Troubleshooting</a><a href="relationships.html" class="tab">Relationship Map</a>
      </nav>
    </header>
    <main>
      <section class="panel controls">
        <label for="node-search">Find a node</label>
        <input id="node-search" type="search" placeholder="Type node name..." />
        <button id="clear-search" type="button">Clear</button><button id="tour-next" type="button">Next Guided Step</button><button id="toggle-focus" type="button" aria-pressed="false">Full Screen Mode</button>
      </section>
      <section class="panel split">
        <div class="diagram-wrap scrollable">
          <svg id="architecture-svg" class="diagram" viewBox="0 0 1000 1200" aria-label="OTL architecture diagram"></svg>
          <div id="tooltip" class="tooltip" role="status" aria-live="polite"></div>
        </div>
        <article id="object-detail" class="detail"></article>
      </section>
    </main>
    <script type="module" src="src/js/app.js"></script>
  </body>
</html>
