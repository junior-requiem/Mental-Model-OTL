<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTL Lifecycle Diagram</title>
    <link rel="stylesheet" href="src/css/styles.css" />
  </head>
  <body data-page="lifecycle" class="diagram-page">
    <header class="hero">
      <div class="hero-title-row">
        <h1>Lifecycle Flow</h1>
      </div>
      <p id="hero-subtitle" class="hero-subtitle"></p>
      <nav class="tabs" aria-label="Diagram pages">
        <a href="index.html" class="tab">Overview</a>
        <a href="architecture.html" class="tab">Architecture</a>
        <a href="lifecycle.html" class="tab active">Lifecycle</a>
        <a href="troubleshooting.html" class="tab">Troubleshooting</a>
        <a href="relationships.html" class="tab">Relationship Map</a>
      </nav>
    </header>

    <main class="diagram-main">
      <section class="panel controls diagram-toolbar">
        <label for="node-search">Find a step</label>
        <input id="node-search" type="search" placeholder="Type lifecycle step..." />
        <button id="clear-search" type="button">Clear</button>
        <button id="tour-next" type="button">Next Guided Step</button>
      </section>

      <section class="panel diagram-stage">
        <div class="diagram-wrap scrollable">
          <svg id="lifecycle-svg" class="diagram" viewBox="0 0 2000 560" aria-label="OTL lifecycle flow"></svg>
          <div id="tooltip" class="tooltip"></div>
        </div>
        <article id="object-detail" class="detail floating-detail"></article>
      </section>
    </main>

    <script type="module" src="src/js/app.js"></script>
  </body>
</html>
