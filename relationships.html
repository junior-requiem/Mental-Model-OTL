<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTL Relationship Map</title>
    <link rel="stylesheet" href="src/css/styles.css" />
  </head>
  <body data-page="relationships" class="diagram-page">
    <header class="hero">
      <div class="hero-title-row">
        <h1>Relationship Map</h1>
      </div>
      <p id="hero-subtitle" class="hero-subtitle"></p>
      <nav class="tabs" aria-label="Diagram pages">
        <a href="index.html" class="tab">Overview</a>
        <a href="architecture.html" class="tab">Architecture</a>
        <a href="lifecycle.html" class="tab">Lifecycle</a>
        <a href="troubleshooting.html" class="tab">Troubleshooting</a>
        <a href="relationships.html" class="tab active">Relationship Map</a>
      </nav>
    </header>

    <main class="diagram-main">
      <section class="panel controls diagram-toolbar">
        <label for="node-search">Find an object</label>
        <input id="node-search" type="search" placeholder="Type relationship node..." />
        <button id="clear-search" type="button">Clear</button>
        <button id="zoom-in" type="button">Zoom In</button>
        <button id="zoom-out" type="button">Zoom Out</button>
        <button id="zoom-reset" type="button">Reset</button>
        <span id="zoom-value" class="zoom-value">100%</span>
        <button id="tour-next" type="button">Next Guided Step</button>
        <a href="relationship-map-test.html" class="tab">Open Test Page</a>
      </section>

      <section class="panel filter-row diagram-filters" aria-label="Layer filters">
        <button type="button" data-filter-group="all" class="active">All</button>
        <button type="button" data-filter-group="runtime">Experience</button>
        <button type="button" data-filter-group="setup">Policy</button>
        <button type="button" data-filter-group="consumer">Consumer</button>
      </section>

      <section class="panel diagram-stage">
        <div class="diagram-wrap scrollable" id="relationship-viewport">
          <svg id="relationship-svg" class="diagram" viewBox="0 0 2100 1080" aria-label="OTL relationship map"></svg>
          <div id="tooltip" class="tooltip"></div>
        </div>
        <article id="object-detail" class="detail floating-detail"></article>
      </section>
    </main>

    <script type="module" src="src/js/app.js"></script>
  </body>
</html>
